version: '{build}-{branch}'

branches:
  only:
  - master

skip_tags: true

image: Ubuntu2204

configuration: release

init:
- sh: >-
    echo "--- Installing dependencies ---"
    sudo apt-get --assume-yes update
    sudo apt-get --assume-yes install cmake pkg-config libglfw3-dev
    sudo apt-get --assume-yes install libjpeg-dev libpng-dev zlib1g-dev
    sudo apt-get --assume-yes install liblcms2-dev libexif-dev libgif-dev libtiff-dev libwebp-dev libopenexr-dev libopenjp2-7-dev

platform: x64

build_script:
- sh: make -j release
